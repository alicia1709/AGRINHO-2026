<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuro Verde</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="container-bolhas"></div>

    <header class="cabecalho">
        <img src="1.png" alt="Futuro Verde" class="imagem-banner">
    </header>

    <section class="secao globo">
        <div class="caixa-texto esconder">
            <h2>Preservação e Tecnologia</h2>
            <p>Conectando o mundo natural com as maiores inovações do amanhã.</p>
        </div>
    </section>

    <section class="secao bolhas">
        <div class="caixa-texto esconder">
            <h2>Ar Puro e Inovação</h2>
            <p>Nossas ideias fluem com a leveza e a transparência da natureza.</p>
        </div>
    </section>

    <section class="secao grama">
        <div class="caixa-texto esconder">
            <h2>Crescimento Sustentável</h2>
            <p>Cultivando um amanhã ecologicamente correto para as próximas gerações.</p>
        </div>
    </section>

  <footer class="rodape">
    <div class="conteudo-rodape esconder">
        <h2>Conecte-se com a Comunidade</h2>
        <img src="6.png" alt="Comunidade" class="imagem-contato">
    </div>
</footer>

    <script src="script.js"></script>
</body>
</html>
